<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar (Transactional - Nav Shell Logic: This is a focused task, but user requested Back Button and Title in header) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-14 bg-surface/70 backdrop-blur-md">
<button aria-label="Kembali" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-page-title text-page-title text-on-surface">Kuis Sejarah</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 mt-14 px-margin-mobile pb-safe-area-bottom flex flex-col">
<!-- Progress Section -->
<div class="mt-lg">
<div class="flex justify-between items-center mb-base">
<span class="font-label-sm text-label-sm text-on-surface-variant">Pertanyaan 2 dari 5</span>
<span class="font-label-sm text-label-sm text-primary font-semibold">40%</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-secondary rounded-full" style="width: 40%;"></div>
</div>
</div>
<!-- Question Section -->
<div class="mt-xl flex-1 flex flex-col">
<h2 class="font-section-title text-section-title text-on-surface mb-xl">
                Siapakah tokoh utama dalam pembebasan Irian Barat?
            </h2>
<!-- Answer Options -->
<div class="flex flex-col gap-sm" id="quiz-options">
<button class="quiz-option group w-full text-left p-md bg-[#EEF3F8] rounded-[16px] border border-outline-variant hover:border-secondary transition-all flex items-center gap-md" data-value="A">
<div class="w-8 h-8 rounded-full flex items-center justify-center bg-white text-on-surface font-button-text text-button-text shadow-sm group-[.selected]:bg-secondary group-[.selected]:text-on-primary transition-colors">A</div>
<span class="font-body-md text-body-md text-on-surface group-[.selected]:font-semibold">Soekarno</span>
</button>
<button class="quiz-option group w-full text-left p-md bg-[#EEF3F8] rounded-[16px] border border-outline-variant hover:border-secondary transition-all flex items-center gap-md" data-value="B">
<div class="w-8 h-8 rounded-full flex items-center justify-center bg-white text-on-surface font-button-text text-button-text shadow-sm group-[.selected]:bg-secondary group-[.selected]:text-on-primary transition-colors">B</div>
<span class="font-body-md text-body-md text-on-surface group-[.selected]:font-semibold">Soeharto</span>
</button>
<button class="quiz-option group w-full text-left p-md bg-[#EEF3F8] rounded-[16px] border border-outline-variant hover:border-secondary transition-all flex items-center gap-md" data-value="C">
<div class="w-8 h-8 rounded-full flex items-center justify-center bg-white text-on-surface font-button-text text-button-text shadow-sm group-[.selected]:bg-secondary group-[.selected]:text-on-primary transition-colors">C</div>
<span class="font-body-md text-body-md text-on-surface group-[.selected]:font-semibold">Yos Sudarso</span>
</button>
<button class="quiz-option group w-full text-left p-md bg-[#EEF3F8] rounded-[16px] border border-outline-variant hover:border-secondary transition-all flex items-center gap-md" data-value="D">
<div class="w-8 h-8 rounded-full flex items-center justify-center bg-white text-on-surface font-button-text text-button-text shadow-sm group-[.selected]:bg-secondary group-[.selected]:text-on-primary transition-colors">D</div>
<span class="font-body-md text-body-md text-on-surface group-[.selected]:font-semibold">Gatot Subroto</span>
</button>
</div>
</div>
<!-- Bottom CTA -->
<div class="mt-xl pb-lg pt-md">
<button class="w-full h-[56px] rounded-xl bg-secondary text-on-secondary font-button-text text-button-text flex items-center justify-center gap-2 opacity-50 cursor-not-allowed transition-opacity" disabled="" id="btn-lanjut">
                Lanjut
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.quiz-option');
            const btnLanjut = document.getElementById('btn-lanjut');
            let selectedOption = null;

            options.forEach(option => {
                option.addEventListener('click', () => {
                    // Remove selected state from all
                    options.forEach(opt => {
                        opt.classList.remove('selected', 'border-secondary', 'bg-secondary-container/10');
                        opt.classList.add('border-outline-variant');
                    });

                    // Add selected state to clicked
                    option.classList.add('selected', 'border-secondary', 'bg-secondary-container/10');
                    option.classList.remove('border-outline-variant');
                    
                    selectedOption = option.dataset.value;

                    // Enable CTA
                    btnLanjut.disabled = false;
                    btnLanjut.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnLanjut.classList.add('hover:opacity-90', 'active:scale-95');
                });
            });
        });
    </script>
